# @package _global_
defaults:
  - override /hydra/sweeper: optuna

hydra:
  sweeper:
    sampler:
      seed: 42
    direction: minimize
    study_name: base-patch16
    storage: null
    n_trials: 50
    n_jobs: 1
    max_failure_rate: 0.0
    params:
      train.commit_loss_weight: tag(log, range(1e-7, 1))
      train.entropy_sample_minimization_weight: tag(log, interval(1e-5, 10))
      train.entropy_batch_maximization_weight: tag(log, interval(1e-5, 1))
      train.ema.beta: tag(log, interval(0.99, 0.999))
      train.optimizer.args.lr: tag(log,interval(1e-4, 1e-3))
      train.max_steps: 501
      train.eval_every_num_steps: 500
    
